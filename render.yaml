services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard

    # Add telegram flag to enable Telegram bot
    dockerCommand: node dist/index.js gateway --allow-unconfigured --bind 0.0.0.0 --port $PORT --telegram

    envVars:
      - key: SETUP_PASSWORD
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      - key: NODE_OPTIONS
        value: --max-old-space-size=1700
      
      # Explicitly enable Telegram
      - key: ENABLE_TELEGRAM
        value: "true"

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
