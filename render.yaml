services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    envVars:
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: NODE_OPTIONS
        value: --max-old-space-size=1700
      - key: HOST
        value: 0.0.0.0
      - key: BIND
        value: 0.0.0.0
      - key: LISTEN_HOST
        value: 0.0.0.0
      - key: SERVER_HOST
        value: 0.0.0.0
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
