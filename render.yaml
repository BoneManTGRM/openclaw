services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    envVars:
      - key: SETUP_PASSWORD
        sync: false

      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      - key: NODE_OPTIONS
        value: --max-old-space-size=1700

      - key: HOST
        value: 0.0.0.0
      - key: BIND
        value: 0.0.0.0

      # Render requires binding to $PORT
      - key: PORT
        value: "10000"

      # Try to force Openclaw itself to bind publicly
      - key: OPENCLAW_PORT
        value: "10000"
      - key: OPENCLAW_HOST
        value: 0.0.0.0

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
