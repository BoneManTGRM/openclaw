services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard

    # Let OpenClaw use Render's assigned PORT
    dockerCommand: node dist/index.js gateway --allow-unconfigured --bind 0.0.0.0 --port $PORT

    envVars:
      - key: SETUP_PASSWORD
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      - key: NODE_OPTIONS
        value: --max-old-space-size=1700

      # Remove the hardcoded PORT - let Render assign it dynamically

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
