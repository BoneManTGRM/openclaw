services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard

    # IMPORTANT: force OpenClaw to bind publicly so Render detects the port
    dockerCommand: node dist/index.js gateway --allow-unconfigured --bind lan --port 10000

    envVars:
      - key: SETUP_PASSWORD
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      # Required when you bind beyond localhost
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      - key: NODE_OPTIONS
        value: --max-old-space-size=1700

      # Keep Render's port fixed and match the command above
      - key: PORT
        value: "10000"

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
