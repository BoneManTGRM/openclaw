services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard

    # Let OpenClaw use Render's assigned PORT
    dockerCommand: node dist/index.js gateway --allow-unconfigured --bind 0.0.0.0 --port $PORT

    envVars:
      - key: SETUP_PASSWORD
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      - key: NODE_OPTIONS
        value: --max-old-space-size=1700

      # Gateway URL for Telegram bot to connect
      - key: OPENCLAW_GATEWAY_URL
        value: https://openclaw.onrender.com

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2

  # Telegram bot service
  - type: worker
    name: clawdbot-telegram
    runtime: docker
    plan: starter

    dockerCommand: node dist/index.js telegram

    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: OPENCLAW_GATEWAY_URL
        value: https://openclaw.onrender.com

      # Share the same gateway token
      - key: OPENCLAW_GATEWAY_TOKEN
        fromService:
          name: openclaw
          type: web
          envVarKey: OPENCLAW_GATEWAY_TOKEN

      - key: NODE_OPTIONS
        value: --max-old-space-size=512
