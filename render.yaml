services:
  - type: worker
    name: openclaw
    runtime: docker
    plan: starter
    envVars:
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: NODE_OPTIONS
        value: --max-old-space-size=1536
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
