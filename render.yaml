services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard

    envVars:
      - key: SETUP_PASSWORD
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: TELEGRAM_ALLOWED_CHAT_IDS
        value: "930276646"

      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw

      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      - key: NODE_OPTIONS
        value: --max-old-space-size=1700

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
