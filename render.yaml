services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard

    envVars:
      - key: SETUP_PASSWORD
        sync: false

      # Telegram
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_IDS
        value: "930276646"

      # OpenClaw storage
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      # Gateway security token (generated by Render)
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      # Memory tuning
      - key: NODE_OPTIONS
        value: --max-old-space-size=1700

      # Keep only if OpenClaw uses this flag internally
      - key: ENABLE_TELEGRAM
        value: "true"

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
