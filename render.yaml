services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard

    envVars:
      - key: SETUP_PASSWORD
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      # TEMP: use a fresh state dir so old config on disk cannot force loopback
      - key: OPENCLAW_STATE_DIR
        value: /tmp/.openclaw

      # Keep workspace persistent
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      - key: NODE_OPTIONS
        value: --max-old-space-size=1700

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
