services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard

    # IMPORTANT: use the wrapper instead of inline exec
    dockerCommand: node scripts/render-start.mjs

    envVars:
      - key: SETUP_PASSWORD
        sync: false

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw

      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace

      # This is REQUIRED for the Control UI pairing
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true

      - key: NODE_OPTIONS
        value: --max-old-space-size=1700

    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
